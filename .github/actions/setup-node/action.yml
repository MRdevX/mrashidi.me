name: Setup Node.js
description: Install pnpm (from packageManager), Node from .node-version, cache pnpm store, frozen install.

runs:
  using: composite
  steps:
    - name: pnpm
      uses: pnpm/action-setup@v5

    - name: Node.js (version from repo)
      uses: actions/setup-node@v6
      with:
        node-version-file: ".node-version"
        cache: pnpm

    - name: Respect engines in package.json
      run: pnpm config set engine-strict true
      shell: bash

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
