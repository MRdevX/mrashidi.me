name: Setup
description: Node + pnpm install

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5

    - uses: actions/setup-node@v6
      with:
        node-version-file: ".node-version"
        cache: pnpm

    - run: pnpm config set engine-strict true
      shell: bash

    - run: pnpm install --frozen-lockfile
      shell: bash
