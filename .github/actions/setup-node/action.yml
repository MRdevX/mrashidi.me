name: "Setup Node.js and pnpm"
description: "Checkout code, setup pnpm and Node.js, and install dependencies"

inputs:
  node-version:
    description: "Node.js version to use"
    required: false
    default: "24"
  pnpm-version:
    description: "pnpm version to use (defaults to packageManager from package.json)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
