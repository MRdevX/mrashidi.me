name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version type (major, minor, patch)"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate version and changelog
        if: github.event_name == 'workflow_dispatch'
        run: |
          pnpm release -- --release-as ${{ github.event.inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        if: github.event_name == 'workflow_dispatch'
        id: package_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # Extract version from tag (e.g., v0.1.90 -> 0.1.90)
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # Get version from package.json after standard-version
            VERSION=${{ steps.package_version.outputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build application
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Extract changelog for version
        id: changelog
        run: |
          python3 << 'EOF' > changelog.txt
          version_num = "${{ steps.get_version.outputs.version }}"
          try:
              with open('CHANGELOG.md', 'r') as f:
                  lines = f.readlines()
              in_section = False
              output = []
              for line in lines:
                  if line.startswith(f'### [{version_num}]'):
                      in_section = True
                      output.append(line)
                  elif in_section and line.startswith('### ['):
                      break
                  elif in_section:
                      output.append(line)
              result = ''.join(output).strip() if output else ''.join(lines[:30]).strip()
              print(result)
          except Exception as e:
              print(f"Error extracting changelog: {e}")
              print("See CHANGELOG.md for details")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', steps.get_version.outputs.version) }}
          name: Release ${{ github.ref_name || format('v{0}', steps.get_version.outputs.version) }}
          body_path: changelog.txt
          draft: false
          prerelease: false

      - name: Push changes
        if: github.event_name == 'workflow_dispatch'
        run: |
          git push --follow-tags origin main
