name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NEXT_TELEMETRY_DISABLED: 1

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node

      - name: Commitlint
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

      - run: pnpm exec biome check . --reporter=github

      - run: pnpm exec tsc --noEmit

      - run: pnpm test:run

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: unit-test-results
          path: |
            test-results/
            coverage/
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node

      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'playwright.config.ts') }}
          restore-keys: playwright-${{ runner.os }}-

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality, e2e]
    if: ${{ always() && needs.quality.result == 'success' && needs.e2e.result == 'success' }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node

      - run: pnpm build
