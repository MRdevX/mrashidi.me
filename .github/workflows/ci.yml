name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Run Biome check
        id: biome-check
        run: pnpm check

      - name: Type check
        id: ts-check
        run: pnpm exec tsc --noEmit

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const biomeStatus = '${{ steps.biome-check.outcome }}' === 'success' ? '✅ Passed' : '❌ Failed';
            const tsStatus = '${{ steps.ts-check.outcome }}' === 'success' ? '✅ Passed' : '❌ Failed';
            const overallStatus = (steps.biome-check.outcome === 'success' && steps.ts-check.outcome === 'success') ? '✅' : '❌';

            const body = `## Code Quality Check Results ${overallStatus}

            - **Biome Check**: ${biomeStatus}
            - **TypeScript Check**: ${tsStatus}

            ${overallStatus === '❌' ? 'Please fix the issues above before merging.' : 'All checks passed!'}`;

            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(
              comment => comment.user.type === 'Bot' && comment.body.includes('Code Quality Check Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Run unit tests
        run: pnpm test:run

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-results
          path: |
            test-results/
            coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint-and-type-check
      - unit-tests
      - e2e-tests
    steps:
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Build application
        run: pnpm build:fast
        env:
          NEXT_TELEMETRY_DISABLED: 1
