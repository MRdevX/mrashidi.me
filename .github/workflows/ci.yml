name: CI

# Keep paths-ignore in sync with Security workflow.
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:

run-name: "CI: ${{ github.event.pull_request.title || github.ref_name }}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Validate commit messages
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  lint-and-type-check:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Run Biome check
        run: pnpm check

      - name: Type check
        run: pnpm exec tsc --noEmit

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Run unit tests
        run: pnpm test:run

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: |
            test-results/
            coverage/
          if-no-files-found: ignore
          retention-days: 7

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint-and-type-check
      - unit-tests
      - e2e-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Build application
        run: pnpm build:fast
        env:
          NEXT_TELEMETRY_DISABLED: 1
