# Lint, unit tests, Playwright E2E, then Next.js build (CI skips assets + PWA; see job summary).
#
# Smart triggering:
#   push:main / workflow_dispatch  → all jobs always run (safety net before auto-release).
#   pull_request                   → "changes" detects which buckets are affected;
#                                    only impacted jobs run. Skipped jobs count as "ok"
#                                    so the build gate still works.

name: CI

run-name: CI — ${{ github.ref_name }}

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NEXT_TELEMETRY_DISABLED: 1

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Job graph:
#
#   changes ──┬──► quality ──┐
#             ├──► e2e    ───┼──► build
#             └──────────────┘
# ---------------------------------------------------------------------------

jobs:
  # ── 1. Detect which buckets are affected ──────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # On push/dispatch: always true. On PRs: true only when relevant paths changed.
      quality: ${{ github.event_name != 'pull_request' || steps.filter.outputs.quality == 'true' }}
      e2e:     ${{ github.event_name != 'pull_request' || steps.filter.outputs.e2e     == 'true' }}
      build:   ${{ github.event_name != 'pull_request' || steps.filter.outputs.build   == 'true' }}
    steps:
      # paths-filter uses the GitHub API for pull_request events — no checkout needed.
      - name: Path filter (PRs only)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            quality:
              - 'src/**'
              - 'tests/unit/**'
              - 'tests/setup.ts'
              - 'tests/utils/**'
              - 'tests/fixtures/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'biome.json'
              - 'vitest.config.mts'
              - 'sentry-shared.ts'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - 'tests/fixtures/**'
              - 'tests/utils/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
            build:
              - 'src/**'
              - 'public/**'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'next.config.mjs'
              - 'tsconfig.json'
              - 'postcss.config.js'
              - 'tailwind.config.ts'
              - 'sentry.edge.config.ts'
              - 'sentry.server.config.ts'
              - 'sentry-shared.ts'
              - '.github/workflows/ci.yml'
              - '.github/actions/**'

  # ── 2. Lint · Typecheck · Unit tests ──────────────────────────────────────
  quality:
    name: Lint · Typecheck · Unit tests
    needs: changes
    if: needs.changes.outputs.quality == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node

      - name: Commitlint (PRs only)
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

      - name: Lint (Biome)
        run: pnpm exec biome check . --reporter=github

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests (Vitest)
        run: pnpm exec vitest run --reporter=verbose --reporter=github-actions

      - name: Job summary — quality
        if: success()
        run: |
          {
            echo "## Quality passed"
            echo ""
            echo "- Lint: Biome (\`pnpm check\`)"
            echo "- Types: TypeScript (\`tsc --noEmit\`)"
            echo "- Unit tests: Vitest (\`pnpm test:run\`)"
            echo ""
            echo "_PR pushes also run Commitlint against the commit range above._"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v7
        name: Upload unit test artifacts (on failure)
        if: failure()
        with:
          name: unit-test-results
          path: |
            test-results/
            coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ── 3. Playwright E2E (browser matrix) ────────────────────────────────────
  e2e:
    name: E2E / ${{ matrix.project }}
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # Let all browsers finish so you see the full cross-browser picture at once.
      fail-fast: false
      matrix:
        include:
          # project: playwright project name   browser: engine to install
          - project: chromium
            browser: chromium
          - project: firefox
            browser: firefox
          - project: webkit
            browser: webkit
          - project: mobile-chrome
            browser: chromium   # Mobile Chrome is Chromium under the hood
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          # Scope cache per engine (mobile-chrome reuses the chromium cache key).
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'playwright.config.ts') }}
          restore-keys: playwright-${{ runner.os }}-${{ matrix.browser }}-

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      - name: E2E tests — ${{ matrix.project }}
        run: pnpm test:e2e --project="${{ matrix.project }}"

      - name: Job summary — ${{ matrix.project }}
        if: success()
        run: |
          {
            echo "## E2E passed · ${{ matrix.project }}"
            echo ""
            echo "- Project: \`${{ matrix.project }}\` (engine: \`${{ matrix.browser }}\`)"
            echo "- Cached: \`\$HOME/.cache/ms-playwright\` when lockfile/key unchanged"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v7
        name: Upload E2E report (on failure)
        if: failure()
        with:
          name: e2e-artifacts-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  # ── 4. Next.js build (runs only when quality + e2e both passed or were irrelevant) ──
  build:
    name: Build
    needs: [changes, quality, e2e]
    # "skipped" means the job was not applicable (paths didn't change) — that's fine.
    if: |
      always() &&
      needs.changes.outputs.build == 'true' &&
      (needs.quality.result == 'success' || needs.quality.result == 'skipped') &&
      (needs.e2e.result    == 'success' || needs.e2e.result    == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node

      - name: Restore Next.js cache
        uses: actions/cache@v5
        id: next-cache
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-cache-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-next-cache-

      - name: Next.js build (CI profile)
        run: pnpm build:ci

      - name: Job summary — build
        if: success()
        run: |
          {
            echo "## Build passed"
            echo ""
            echo "- Command: \`pnpm build:ci\` (= \`build:fast\`: no asset pregeneration, **PWA off**)."
            echo "- Production deploy should use \`pnpm build\` (assets + **PWA**)."
            CACHE_HIT="${{ steps.next-cache.outputs.cache-hit }}"
            if [ "$CACHE_HIT" = 'true' ]; then
              echo "- Next cache: **hit** (restored \`.next/cache\`)."
            else
              echo "- Next cache: **miss** (\`pnpm-lock.yaml\` key or first run — cold compile)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
