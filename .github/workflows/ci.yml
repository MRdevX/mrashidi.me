name: CI

# Keep paths-ignore in sync with Security workflow.
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: "Skip Playwright E2E (faster manual run)"
        type: boolean
        default: false

run-name: "CI: ${{ github.event.pull_request.title || github.ref_name }}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NEXT_TELEMETRY_DISABLED: 1

permissions:
  contents: read

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Validate commit messages
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  quality:
    name: Lint, types & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Biome (format, lint, imports)
        run: pnpm exec biome check . --reporter=github

      - name: TypeScript
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test:run

      - name: Upload unit test outputs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: |
            test-results/
            coverage/
          if-no-files-found: ignore
          retention-days: 7

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_e2e != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'playwright.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build (production parity)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - quality
      - e2e-tests
    if: |
      always() &&
      needs.quality.result == 'success' &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      # Full pipeline (sitemap, OG images, PWA). E2E uses build:fast + start to avoid two heavy builds.
      - name: Build application
        run: pnpm build
