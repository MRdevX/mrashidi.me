name: Security

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

run-name: "Security: ${{ github.event.pull_request.title || github.ref_name }}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  codeql-analysis:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-node

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  dependency-review:
    name: Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
