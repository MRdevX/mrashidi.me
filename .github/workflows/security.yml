name: Security

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - uses: ./.github/actions/setup-node

      - uses: github/codeql-action/analyze@v4

  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
