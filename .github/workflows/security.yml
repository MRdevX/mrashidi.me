# Supply chain and static analysis: dependency audit, CodeQL (JS), PR dependency review.

name: Security

run-name: Security — ${{ github.ref_name }}

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".versionrc.json"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  pnpm-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node

      - name: Audit (high or higher fails the job)
        run: pnpm audit --audit-level=high

      - name: Job summary — audit
        if: success()
        run: |
          cat << EOF >> "$GITHUB_STEP_SUMMARY"
          ## Dependency audit passed
          \`pnpm audit --audit-level=high\` — tighten or upstream-only exceptions if this fails later.
          EOF

  codeql:
    name: CodeQL (JavaScript)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4

  dependency-review:
    name: PR dependency diff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Review license / severity deltas
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
