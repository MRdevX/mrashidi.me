name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-release:
    name: Automatic Version & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: "!startsWith(github.ref, 'refs/tags/')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for new commits and run standard-version
        id: version
        run: |
          # Check if there are new commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS_SINCE_TAG=$(git rev-list $LAST_TAG..HEAD --count)
            if [ "$COMMITS_SINCE_TAG" -eq 0 ]; then
              echo "No new commits since last tag, skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Get current version
          OLD_VERSION=$(node -p "require('./package.json').version")

          # Run standard-version
          pnpm release || true

          # Get new version
          NEW_VERSION=$(node -p "require('./package.json').version")

          # Check if version changed
          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "Version bumped from $OLD_VERSION to $NEW_VERSION"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "version_bumped=true" >> $GITHUB_OUTPUT
          else
            echo "No version bump detected"
            echo "version_bumped=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push changes and tags
        if: steps.version.outputs.version_bumped == 'true'
        run: |
          git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog
        if: steps.version.outputs.version_bumped == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -n "/^### \[$VERSION\]/,/^### \[/p" CHANGELOG.md | sed '$d' > changelog.txt || echo "See CHANGELOG.md for details" > changelog.txt

      - name: Create GitHub Release
        if: steps.version.outputs.version_bumped == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: changelog.txt
          draft: false
          prerelease: false
