name: Auto Release

# Runs only after CI succeeds on main (workflow_run). Do not add push: main here — a second
# trigger races and duplicates version tags. See:
# https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#workflow_run
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

run-name: "Release: ${{ github.event.workflow_run.head_branch }}"

concurrency:
  group: auto-release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  auto-release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch != '' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Prepare repository
        uses: ./.github/actions/prepare-repo
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: "0"
          fetch-tags: "true"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version bump and tag
        id: version
        run: bash scripts/ci-auto-release.sh "${{ github.event.workflow_run.head_branch }}"

      - name: Push changes and tags
        if: steps.version.outputs.should_release == 'true'
        run: git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const tag = `v${version}`;
            const prerelease = version.includes('-');
            const { owner, repo } = context.repo;
            const statusOf = (e) => e.status ?? e.response?.status;
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (e) {
              if (statusOf(e) !== 404) throw e;
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: `Release v${version}`,
                generate_release_notes: true,
                draft: false,
                prerelease,
              });
            }
