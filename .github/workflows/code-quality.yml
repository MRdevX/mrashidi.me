name: Code Quality

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome check
        id: biome-check
        run: pnpm check
        continue-on-error: false

      - name: TypeScript type check
        id: ts-check
        run: pnpm exec tsc --noEmit
        continue-on-error: false

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && (steps.biome-check.outcome != 'success' || steps.ts-check.outcome != 'success')
        uses: actions/github-script@v7
        with:
          script: |
            const biomeStatus = '${{ steps.biome-check.outcome }}' === 'success' ? '✅ Passed' : '❌ Failed';
            const tsStatus = '${{ steps.ts-check.outcome }}' === 'success' ? '✅ Passed' : '❌ Failed';

            const body = `## Code Quality Check Results

            - **Biome Check**: ${biomeStatus}
            - **TypeScript Check**: ${tsStatus}

            Please fix the issues above before merging.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
