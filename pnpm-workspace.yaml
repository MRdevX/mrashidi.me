packages:
  # Include the root package
  - "."
  # Exclude build outputs and dependencies
  - "!**/.next/**"
  - "!**/node_modules/**"
  - "!**/.pnpm-store/**"

overrides:
  serialize-javascript: ">=7.0.3"
  fast-uri: ">=3.1.2"
  "@babel/plugin-transform-modules-systemjs": ">=7.29.4"
  postcss: ">=8.5.10"

# Optimize dependency resolution for faster installs
resolutionMode: "lowest-direct"

# Enable optimistic repeat installs for faster development
optimisticRepeatInstall: true

# Enable shell emulator for cross-platform compatibility
shellEmulator: true

# Optimize hoisting for better performance and tool compatibility
hoist: true
hoistPattern:
  - "*typescript*"
  - "*biome*"
  - "*eslint*"
  - "*prettier*"

# Only build dependencies that need native compilation
onlyBuiltDependencies:
  - "@sentry/cli"
  - "@tailwindcss/oxide"
  - "@vercel/speed-insights"
  - canvas
  - esbuild
  - sharp

# Flexible peer dependency handling for development
strictPeerDependencies: false
autoInstallPeers: true
minimumReleaseAgeExclude:
  - '@aws-sdk/client-ses@3.1051.0'
  - '@next/env@16.2.7'
  - '@next/swc-darwin-arm64@16.2.7'
  - '@next/swc-darwin-x64@16.2.7'
  - '@next/swc-linux-arm64-gnu@16.2.7'
  - '@next/swc-linux-arm64-musl@16.2.7'
  - '@next/swc-linux-x64-gnu@16.2.7'
  - '@next/swc-linux-x64-musl@16.2.7'
  - '@next/swc-win32-arm64-msvc@16.2.7'
  - '@next/swc-win32-x64-msvc@16.2.7'
  - '@types/react@19.2.16'
  - next@16.2.7
  - react@19.2.7
  - react-dom@19.2.7
  - '@vitest/expect@4.1.7'
  - '@vitest/mocker@4.1.7'
  - '@vitest/pretty-format@4.1.7'
  - '@vitest/runner@4.1.7'
  - '@vitest/snapshot@4.1.7'
  - '@vitest/spy@4.1.7'
  - '@vitest/ui@4.1.7'
  - '@vitest/utils@4.1.7'
  - vitest@4.1.7
  - lucide-react@1.18.0
allowBuilds:
  '@sentry/cli': true
  esbuild: true
  sharp: true
